<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Simulator Log in</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-content">
        <div class="login-container">
            <div class="profile-pic">
                <i class="fa-brands fa-instagram"></i>
            </div>
            
            <h2 class="login-title">Login to Instagram</h2>
            
            <form action="#" method="POST" class="form-wrapper" onsubmit="event.preventDefault(); alert('Login disimulasikan! Ingat, cek URL sebelum input data!');">
                <div class="input-row">
                    <div class="icon-box">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <input type="text" placeholder="Username" required>
                </div>
                
                <div class="input-row">
                    <div class="icon-box">
                        <i class="fa-solid fa-lock" style="font-size: 14px;"></i>
                    </div>
                    <input type="password" placeholder="***********" required>
                </div>
                
                <div class="options-row">
                    <label class="remember">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot">Forgot Password?</a>
                </div>
                
                <button type="submit" class="submit-btn">LOGIN</button>
            </form>
        </div>
    </div>
    
    <div class="educational-footer">
        <i class="fa-solid fa-shield-halved"></i>
        <p>Halaman ini adalah simulasi edukasi keamanan cyber, perhatikan URL sebelum memasukan data sensitive</p>
    </div>
</body>
</html>
